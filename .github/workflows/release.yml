name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Inject version from tag into all source files
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $v = $tag -replace '^v', ''
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "Version: $v (from tag: $tag)"

          $utf8 = New-Object System.Text.UTF8Encoding($false)

          # package.json
          $pkg = [System.IO.File]::ReadAllText("$pwd\package.json")
          $pkg = $pkg -replace '"version"\s*:\s*"[^"]*"', '"version": "$v"'
          [System.IO.File]::WriteAllText("$pwd\package.json", $pkg, $utf8)

          # tauri.conf.json
          $tc = [System.IO.File]::ReadAllText("$pwd\src-tauri\tauri.conf.json")
          $tc = $tc -replace '"version"\s*:\s*"[^"]*"', '"version": "$v"'
          [System.IO.File]::WriteAllText("$pwd\src-tauri\tauri.conf.json", $tc, $utf8)

          # Cargo.toml
          $ct = [System.IO.File]::ReadAllText("$pwd\src-tauri\Cargo.toml")
          $ct = $ct -replace 'version\s*=\s*"[^"]*"', "version = ""$v"""
          [System.IO.File]::WriteAllText("$pwd\src-tauri\Cargo.toml", $ct, $utf8)

          # index.html
          $html = [System.IO.File]::ReadAllText("$pwd\app\index.html")
          $html = $html -replace 'v\d+\.\d+\.\d+', "v$v"
          [System.IO.File]::WriteAllText("$pwd\app\index.html", $html, $utf8)

          Write-Output "Version injected in all source files"

      - name: Build TypeScript proxy
        run: npm run build

      - name: Build standalone proxy exe (Node.js SEA)
        run: npm run build:sea

      - name: Inject resources into tauri.conf.json
        shell: pwsh
        run: |
          $utf8 = New-Object System.Text.UTF8Encoding($false)
          $tc = [System.IO.File]::ReadAllText("$pwd\src-tauri\tauri.conf.json")
          $j = $tc | ConvertFrom-Json
          $j.bundle | Add-Member -NotePropertyName "resources" -NotePropertyValue @{
            "binary/proxy-server.exe" = "proxy-server.exe"
          } -Force
          $out = $j | ConvertTo-Json -Depth 10
          [System.IO.File]::WriteAllText("$pwd\src-tauri\tauri.conf.json", $out, $utf8)
          Write-Output "Resources config injected"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "vs2lma ${{ github.ref_name }}"
          releaseBody: |
            ## vs2lma ${{ github.ref_name }}

            Windows desktop application wrapping a proxy server for using DeepSeek/OpenAI APIs through Ollama-compatible endpoints.

            ### Features
            - System tray with start/stop control
            - Configuration UI with connection testing
            - Real-time request monitoring
            - Bilingual (English / Chinese)

            ### Install
            - Download the `.msi` or `.exe` setup below
            - **No Node.js installation required** — the proxy engine is bundled

            ### Setup
            1. Launch vs2lma
            2. Enter your API key and base URL in the Configuration tab
            3. Click **Test Connection** to verify
            4. Click **Start Server** to begin proxying
            5. Configure your client to use `http://localhost:11434`
          releaseDraft: false
          prerelease: false
