name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Inject version and resources
        run: node scripts/inject-version.cjs ${{ github.ref_name }}

      - name: Build TypeScript proxy
        run: npm run build

      - name: Build standalone proxy exe
        run: npm run build:sea

      - name: Inject SEA exe into Tauri resources
        run: node -e "const f=require('fs'),p='src-tauri/tauri.conf.json';let c=JSON.parse(f.readFileSync(p,'utf8'));c.bundle=c.bundle||{};c.bundle.resources={'binary/proxy-server.exe':'proxy-server.exe'};f.writeFileSync(p,JSON.stringify(c,null,2))"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "vs2lma ${{ github.ref_name }}"
          releaseBody: |
            ## vs2lma ${{ github.ref_name }}

            Windows desktop application wrapping a proxy server for using DeepSeek/OpenAI APIs through Ollama-compatible endpoints.

            ### Features
            - System tray with start/stop control
            - Configuration UI with connection testing
            - Real-time request monitoring
            - Bilingual (English / Chinese)

            ### Install
            - Download the `.msi` or `.exe` setup below
            - **No Node.js installation required** — the proxy engine is bundled

            ### Setup
            1. Launch vs2lma
            2. Enter your API key and base URL in the Configuration tab
            3. Click **Test Connection** to verify
            4. Click **Start Server** to begin proxying
            5. Configure your client to use `http://localhost:11434`
          releaseDraft: false
          prerelease: false
