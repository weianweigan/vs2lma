name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build TypeScript proxy
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "vs2lma ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](./CHANGELOG.md) for details.

            ### Install
            - Download the `.msi` installer for a standard setup
            - Or use the `.exe` installer for a portable installation

            ### Prerequisites
            - [Node.js](https://nodejs.org/) v18+ must be installed separately
            - Windows 10+ with WebView2 (pre-installed on most systems)
          releaseDraft: false
          prerelease: false
