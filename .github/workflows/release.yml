name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Extract version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          Write-Output "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "Extracted version: $version from tag: $tag"

      - name: Inject version into source files
        shell: pwsh
        run: |
          $v = $env:VERSION
          Write-Output "Setting version to $v"

          # package.json — replace version field
          $pkg = Get-Content package.json -Raw
          $pkg = $pkg -replace '"version"\s*:\s*"[^"]*"', '"version": "$v"'
          Set-Content package.json -Value $pkg -NoNewline

          # tauri.conf.json
          $tc = Get-Content src-tauri/tauri.conf.json -Raw
          $tc = $tc -replace '"version"\s*:\s*"[^"]*"', '"version": "$v"'
          Set-Content src-tauri/tauri.conf.json -Value $tc -NoNewline

          # Cargo.toml
          $ct = Get-Content src-tauri/Cargo.toml -Raw
          $ct = $ct -replace 'version\s*=\s*"[^"]*"', "version = ""$v"""
          Set-Content src-tauri/Cargo.toml -Value $ct -NoNewline

          # index.html
          $html = Get-Content app/index.html -Raw
          $html = $html -replace 'v\d+\.\d+\.\d+', "v$v"
          Set-Content app/index.html -Value $html -NoNewline

          Write-Output "Version injection complete: $v"

      - name: Build TypeScript proxy
        run: npm run build

      - name: Build standalone proxy exe (Node.js SEA)
        run: npm run build:sea

      - name: Inject resources into tauri.conf.json
        shell: pwsh
        run: |
          $tc = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $tc.bundle | Add-Member -NotePropertyName "resources" -NotePropertyValue @{
            "binary/proxy-server.exe" = "proxy-server.exe"
          } -Force
          $tc | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json -NoNewline
          Write-Output "Injected resources config"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "vs2lma ${{ github.ref_name }}"
          releaseBody: |
            ## vs2lma ${{ github.ref_name }}

            Windows desktop application wrapping a proxy server for using DeepSeek/OpenAI APIs through Ollama-compatible endpoints.

            ### Features
            - System tray with start/stop control
            - Configuration UI with connection testing
            - Real-time request monitoring
            - Bilingual (English / Chinese)

            ### Install
            - Download the `.msi` or `.exe` setup below
            - **No Node.js installation required** — the proxy engine is bundled

            ### Setup
            1. Launch vs2lma
            2. Enter your API key and base URL in the Configuration tab
            3. Click **Test Connection** to verify
            4. Click **Start Server** to begin proxying
            5. Configure your client to use `http://localhost:11434`
          releaseDraft: false
          prerelease: false
